server {
    listen 80;
    
    # Root directory for serving static site files
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Enable gzip compression for faster resource delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Key directive: Direct all unknown routes to React's index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable aggressive caching for static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
